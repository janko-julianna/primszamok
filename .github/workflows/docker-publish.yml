name: Docker Image CI

on:
  workflow_dispatch:

  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - name: generate image tag
      run: |
        echo "IMAGE_TAG=$(date +%s)" >> $GITHUB_ENV


    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: |
        docker build . --file Dockerfile --tag ghcr.io/janko-julianna/primszam:$IMAGE_TAG        
        docker login ghcr.io -u janko-julianna -p ${{ secrets.GHCR_PAT }}
        docker push ghcr.io/janko-julianna/primszam:$IMAGE_TAG

        sed -i 's|image: ghcr.io/janko-julianna/primszam:.*|image: ghcr.io/janko-julianna/primszam:'"$IMAGE_TAG"'|' deployment.yaml

        git config --global user.name "janko-julianna"
        git config --global user.email "janko.julianna@jedlik.eu"
        git add deployment.yaml
        git commit -m "update K8S deployment.yaml file"        
        git push

        mkdir -p ~/.kube
        echo "${{ secrets.GHCR_PAT }}" | base64 -d > ~/.kube/config
        kubectl apply -f deployment.yaml




